<html>

<body>
  <!-- <script src="../../../build/oss-experimental/react/cjs/react.development.js"></script> -->
  <!-- <script src="../../../build/oss-experimental/react-dom/cjs/react-dom.development.js"></script> -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.js"></script>
  <div id="container"></div>
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('container'))

    function App() {

      const [count, setCount] = React.useState(0);
      const [company, setCompany] = React.useState("")

      return <div>
        <button onClick={() => setCompany("sssn")}>click</button>
        <h1 className="props-class">Hello World!</h1>

        {
          company ?
            <h2>Hello Company: {company}</h2> :
            <h2>Hello Company: Empty</h2>
        }

        <h1>{count}</h1>
        <button onClick={() => setCount(count + 1)}>
          Increment
        </button>

      </div>

    }

    debugger
    root.render(<App />);
  </script>
</body>

</html>
